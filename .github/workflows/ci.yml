name: CI/CD Pipeline FlaskApp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # 🔹 Job 1 : Tests unitaires
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  # 🔹 Job 2 : Build et push Docker
  build-and-push:
    runs-on: ubuntu-latest
    needs: test   # ne s'exécute que si les tests passent

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t flaskapp .

      # 🔐 Connexion Docker Hub
      - name: Login to Docker Hub
        run: echo "7qiBWAV9BcIhxQOTv6TRwDs6ntE" | docker login -u "abidjan2020" --password-stdin

      # 🔹 Tag images pour plusieurs registres
      - name: Tag Docker image
        run: |
          docker tag flaskapp abidjan2020/flaskapp:latest
          docker tag flaskapp registry.example.com/flaskapp:latest

      # 🚀 Push vers Docker Hub (seulement si succès)
      - name: Push to Docker Hub
        if: success()
        run: docker push abidjan2020/flaskapp:latest

      # 🚀 Push vers registre privé
      - name: Push to Private Registry
        if: success()
        run: docker push registry.example.com/flaskapp:latest

  # 🔹 Job 3 : Notification en cas d’échec
  notify:
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: failure()

    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ciabidjan51@gmail.com
          password: Abidjan2020.
          subject: "Echec du pipeline CI/CD"
          to: your@email.com
          from: GitHub Actions
          body: "Le pipeline CI/CD a échoué. Veuillez vérifier les logs sur GitHub."
