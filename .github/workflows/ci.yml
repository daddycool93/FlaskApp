name: CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # Job 1 : Exécution des tests unitaires
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        run: pytest
        
    

  # Job 2 : Construction et Push de l'image Docker
  build_and_push:
    runs-on: ubuntu-latest
    needs: tests 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Authentification à Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: abidjan2020
          # ⚠️ NE METTEZ PAS VOTRE JETON DOCKER ICI. Laissez cette ligne exactement comme ça :
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Construction et push vers vos dépôts Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            abidjan2020/flaskapp2:latest
            abidjan2020/faskapp:latest
