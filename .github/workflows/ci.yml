name: CI Pipeline

on:
  push:
    branches:
      - master # J'ai mis 'master' car c'est la branche que vous utilisez sur votre terminal
  pull_request:
    branches:
      - master

jobs:
  # Job 1 : Exécution des tests unitaires
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        run: pytest
        
      # Notification par email si un test échoue
      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ciabidjan51@gmail.com # Remplacé par votre adresse
          password: Abidjan2020.
          subject: Échec des tests CI - FlaskApp
          to: ciabidjan51@gmail.com # Remplacé par votre adresse
          from: ciabidjan51@gmail.com # Remplacé par votre adresse

  # Job 2 : Construction et Push de l'image Docker
  build_and_push:
    runs-on: ubuntu-latest
    needs: tests 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Authentification à Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: abidjan2020 # Remplacé par votre vrai nom d'utilisateur Docker
          password: 7qiBWAV9BcIhxQOTv6TRwDs6ntE

      # Construction et push vers vos dépôts Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            abidjan2020/flaskapp2:latest # Votre dépôt public
            abidjan2020/faskapp:latest # Votre dépôt privé
